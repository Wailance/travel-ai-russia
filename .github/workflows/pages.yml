name: Deploy GitHub Pages

# Сайт скрыт: автодеплой отключён. Полный сайт — удалите .site-hidden и запустите workflow вручную.
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Опубликовать полный сайт (false = только заглушка)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Choose artifact path
        id: artifact
        run: |
          if [ "${{ inputs.publish }}" = "true" ] && [ ! -f .site-hidden ]; then
            echo "path=." >> "$GITHUB_OUTPUT"
            echo "Publishing full site"
          else
            echo "path=site-hidden" >> "$GITHUB_OUTPUT"
            echo "Publishing hidden stub"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.artifact.outputs.path }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
